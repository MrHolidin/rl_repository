# MiniBG PPO with structured legal actions + order head (`minibg_structured` actor-critic).
# Trainer вызывает legal_structured_actions / step_structured; obs — плоский вектор OBS_DIM (см. obs.py).
seed: 13

game:
  id: minibg
  params:
    seed: 13
    battle_damage_shaping: 0.06

agent:
  id: ppo
  params:
    network_type: minibg_structured
    observation_type: vector
    # slot torso (как у minibg_slot)
    slot_hidden_channels: 32
    trunk_hidden_size: 256
    region_conv2_kernel: 1
    # card identity embedding над плотным индексом из CARD_TEMPLATES
    card_emb_dim: 16
    # cross-region entity self-attention после conv (до trunk)
    entity_attention_layers: 1
    entity_attention_heads: 4
    entity_attention_ff_mult: 2
    entity_attention_init_scale: 0.1
    use_global_entity_token: true
    # голова structured policy + order decoder
    state_dim: 128
    action_dim: 64
    order_hidden: 64
    order_pos_dim: 16
    learning_rate: 0.0001
    discount_factor: 1.0
    gae_lambda: 0.95
    ppo_clip_eps: 0.2
    clip_value_loss: true
    value_clip_eps: null
    entropy_coef: 0.01
    value_coef: 1.0
    max_grad_norm: 1.0
    rollout_steps: 8096
    ppo_epochs: 4
    minibatch_size: 512
    device: cpu

train:
  max_episodes: 10000000
  total_steps: 4000000
  deterministic: false
  track_timings: false
  start_policy: random
  opponent_sampler:
    type: pool
    params:
      seed: 103
      self_play:
        start_episode: 0
        current_self_fraction: 0.4
        past_self_fraction: 0.4
        max_frozen_agents: 20
        save_every: 1000
        frozen_ema_beta: 0.05
      scripted:
        distribution:
          t1_random: 0.25
          t_up_random: 0.25
  callbacks:
    - type: checkpoint
      params:
        interval: 50000
        prefix: minibg_ppo_structured
    - type: metrics_file
      params:
        interval: 16384

eval:
  enabled: false
  num_episodes: 100
  deterministic: true
