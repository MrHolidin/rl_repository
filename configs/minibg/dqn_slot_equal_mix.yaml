# MiniBG DQN with slot+Conv1d torso (`minibg_slot`). Opponents: random has the same
# total mass as each named bot (1/(1+N) per type with N bots).
# Checkpoints every 50k steps; metrics CSV every 10k (2× more often than 20k).
seed: 13

game:
  id: minibg
  params:
    seed: 13
    battle_damage_shaping: 0.06

agent:
  id: dqn
  params:
    network_type: minibg_slot
    observation_shape: [362]
    slot_hidden_channels: 16
    trunk_hidden_size: 256
    dueling: true
    learning_rate: 0.0001
    discount_factor: 1.0
    use_noisy_nets: true
    noisy_sigma: 0.5
    epsilon: 1.0
    epsilon_decay: 0.999995
    epsilon_min: 0.08
    batch_size: 64
    replay_buffer_size: 1000000
    target_update_freq: 1000
    soft_update: false
    tau: 0.01
    device: gpu
    metrics_interval: 500
    update_every: 4
    grad_clip_norm: 5.0
    n_step: 1
    use_twin_q: true

train:
  max_episodes: 10000000
  total_steps: 5000000
  deterministic: false
  track_timings: false
  start_policy: random
  opponent_sampler:
    type: minibg_mixed
    params:
      seed: 103
      equal_opponent_mass: true
      self_play:
        current_self_fraction: 0.2
        start_episode: 0
      bots:
        - tempo
        - buffer_t2
        - balanced
        - early_t2_pressure
        - wide_t1
        - fast_t3
  callbacks:
    - type: checkpoint
      params:
        interval: 25000
        prefix: minibg_dqn
    - type: metrics_file
      params:
        interval: 5000
    - type: epsilon_decay
      params:
        every: step

eval:
  enabled: false
  num_episodes: 100
  deterministic: true
