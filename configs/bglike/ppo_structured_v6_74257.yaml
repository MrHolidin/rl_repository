seed: 13

game:
  id: bglike
  params:
    seed: 13
    battle_damage_shaping: 0.0
    num_current_seats: 4
    patch_dir: data/bgcore/19_6_0_74257
    shop_excluded_count: 3
    obs_kind: bglike_v5
    percent_high_game: 0.2

agent:
  id: ppo
  params:
    network_type: bglike_structured_v6
    observation_type: vector
    slot_hidden_channels: 64
    region_conv2_kernel: 1
    card_emb_dim: 16
    entity_attention_layers: 4
    entity_attention_heads: 4
    entity_attention_ff_mult: 4
    entity_attention_init_scale: 0.1
    # v3 cross-attention is inherited unchanged. Action tokens cross-attend to
    # the post-self-attention slot tokens, which in v6 already carry the
    # ability bundle — no separate ability region in the K/V.
    action_cross_attn_heads: 4
    action_cross_attn_ff_mult: 2
    action_cross_attn_init_scale: 0.1
    # Per-ability encoder embedding width (effect / trigger / cond_kind /
    # cond_arg_race / filter_race ids each get this many dims; 5 * emb_dim +
    # 1 + 5 → Linear → slot_hidden). 8 is the same default as v5 — keep
    # comparable for ablation.
    ability_emb_dim: 8
    state_dim: 128
    action_dim: 64
    order_hidden: 64
    order_pos_dim: 16
    learning_rate: 0.0001
    discount_factor: 1.0
    gae_lambda: 0.99
    ppo_clip_eps: 0.2
    clip_value_loss: true
    value_clip_eps: null
    entropy_coef: 0.01
    value_coef: 1.0
    max_grad_norm: 1.0
    rollout_steps: 32768
    ppo_epochs: 4
    minibatch_size: 1024
    device: cuda
    battle_pred:
      enabled: true
      aux_coef: 0.01
      detach_features: false
      huber_delta: 5.0
      head_hidden: 128

train:
  max_episodes: 10000000
  total_steps: 5000000
  deterministic: false
  track_timings: false
  start_policy: random
  opponent_sampler:
    type: pool
    params:
      seed: 103
      self_play:
        start_episode: 0
        max_frozen_agents: 15
        save_every: 1000
      scripted:
        mode: bglike
        distribution:
          t1_random: 1
          t_up_random: 1
          structured: 1
          random: 1
      league:
        rating:
          kind: trueskill
          trueskill:
            mu: 25.0
            sigma: 8.333
            beta: 4.167
            tau: 0.083
            draw_probability: 0.01
        sampler:
          kind: trueskill_quality
          current_self_fraction: 0.0
  callbacks:
    - type: checkpoint
      params:
        interval: 200000
        prefix: dist_bglike_ppo_v6_74257
    - type: metrics_file
      params:
        interval: 1

eval:
  enabled: false
  num_episodes: 100
  deterministic: true

distributed:
  workers: 8
  worker_device: cpu
