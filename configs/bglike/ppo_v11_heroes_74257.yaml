# v11_heroes = v11 (flat clean structured AC) + HERO-power awareness.
#
# Trains with heroes assigned to every seat (patch-19.6 pool) and the policy
# OBSERVES its hero via the bglike_v5_heroes obs (OBS_DIM_V5_HEROES = 2683):
#   * self-hero scalar block (identity + effective costs + dynamic counters +
#     combat indicators) late-fused by a dedicated hero_encoder;
#   * each opponent's hero one-hot fused into its opponent token.
# obs_v5 (2536) is a strict prefix, so the only new params vs v11 are the
# hero_encoder, the widened opp_proj, and the resized trunk.
#
# network_type=bglike_structured_v11_heroes auto-pins obs_kind=bglike_v5_heroes
# and defaults with_heroes=true; both are set explicitly below for clarity. A
# heroes net + with_heroes=false (or a non-hero net + with_heroes=true) is a
# hard error (see validate_heroes_consistency).
seed: 13

game:
  id: bglike
  params:
    seed: 13
    battle_damage_shaping: 0.0
    num_current_seats: 4
    patch_dir: data/bgcore/19_6_0_74257
    shop_excluded_count: 1
    obs_kind: bglike_v5_heroes
    with_heroes: true
    percent_high_game: 0.2

agent:
  id: ppo
  params:
    network_type: bglike_structured_v11_heroes
    observation_type: vector
    # --- DvD knobs neutralized: identities exist but carry no reward ---
    num_identities: 4
    diversity_coef: 0.0
    diversity_ema: 0.1
    identity_seed: 103
    # --- v11 architecture (2 entity-attn layers; flat clean trunk) ---
    slot_hidden_channels: 64
    card_emb_dim: 16
    entity_attention_layers: 2
    entity_attention_heads: 4
    entity_attention_ff_mult: 4
    entity_attention_init_scale: 0.1
    action_cross_attn_heads: 4
    action_cross_attn_ff_mult: 2
    action_cross_attn_init_scale: 0.1
    ability_emb_dim: 8
    state_dim: 128
    action_dim: 64
    order_hidden: 64
    order_pos_dim: 16
    summary_queries: 2
    thinking_blocks: 1
    thinking_hidden: 256
    economy_hidden: 64
    economy_out: 32
    combat_out: 16
    pending_ctx_out: 16
    # --- hero scalar encoder (new in v11_heroes) ---
    hero_hidden: 48
    hero_out: 24
    learning_rate: 0.0001
    discount_factor: 1.0
    gae_lambda: 0.99
    ppo_clip_eps: 0.2
    clip_value_loss: false
    value_clip_eps: null
    entropy_coef: 0.01
    value_coef: 0.05
    max_grad_norm: 1.0
    rollout_steps: 32768
    ppo_epochs: 4
    minibatch_size: 1024
    device: cuda

train:
  max_episodes: 10000000
  total_steps: 10000000
  deterministic: false
  track_timings: false
  start_policy: random
  opponent_sampler:
    type: pool
    params:
      seed: 103
      self_play:
        start_episode: 0
        max_frozen_agents: 15
        save_every: 1000
      scripted:
        mode: bglike
        distribution:
          t1_random: 1
          t_up_random: 1
          structured: 1
          random: 1
      league:
        rating:
          kind: trueskill
          trueskill:
            mu: 25.0
            sigma: 8.333
            beta: 4.167
            tau: 0.083
            draw_probability: 0.01
        sampler:
          kind: trueskill_quality
          current_self_fraction: 0.0
  callbacks:
    - type: checkpoint
      params:
        interval: 200000
        prefix: dist_bglike_ppo_v11_heroes
    - type: metrics_file
      params:
        interval: 1
        preset: ppo_dvd

eval:
  enabled: false
  num_episodes: 100
  deterministic: true

distributed:
  workers: 10
  worker_device: cpu
