# Smoke run: 60k env steps, CPU-friendly settings.
seed: 13

game:
  id: bglike
  params:
    seed: 13
    battle_damage_shaping: 0.06
    num_current_seats: 1

agent:
  id: dqn
  params:
    network_type: minibg_mlp
    observation_type: vector
    mlp_hidden_size: 256
    dueling: true
    learning_rate: 0.0001
    discount_factor: 1.0
    use_noisy_nets: false
    epsilon: 1.0
    epsilon_decay: 0.99999
    epsilon_min: 0.1
    batch_size: 32
    replay_buffer_size: 50000
    target_update_freq: 500
    soft_update: false
    tau: 0.01
    device: cpu
    metrics_interval: 1000
    update_every: 4
    grad_clip_norm: 5.0
    n_step: 1
    use_twin_q: true

train:
  max_episodes: 10000000
  total_steps: 60000
  deterministic: false
  track_timings: false
  start_policy: random
  opponent_sampler:
    type: pool
    params:
      seed: 103
      scripted:
        distribution:
          random: 0.5
          t1_random: 0.5
  callbacks:
    - type: checkpoint
      params:
        interval: 60000
        prefix: model
    - type: metrics_file
      params:
        interval: 2000

eval:
  enabled: false
