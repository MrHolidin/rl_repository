# v11_heroes + RND intrinsic-motivation exploration.
#
# Identical to ppo_v11_heroes_74257.yaml except for the `agent.params.rnd` block,
# which turns on Random Network Distillation (arXiv:1810.12894). Novelty is scored
# once per turn on the settled own-board (per-minion-type (n_normal, n_golden)
# counts), runs as a separate non-episodic turn-level advantage stream with its
# own scalar value head, and is combined with the extrinsic placement advantage
# before the single advantage normalization.
#
# Starting coefficients are tuning points, not dogma — watch rnd/adv_int_std vs
# rnd/adv_ext_std (the real "how much intrinsic weighs") and rnd/value_loss grad
# scale, and retune int_coef / value_coef_int from there.
seed: 13

game:
  id: bglike
  params:
    seed: 13
    battle_damage_shaping: 0.0
    num_current_seats: 4
    patch_dir: data/bgcore/19_6_0_74257
    shop_excluded_count: 1
    obs_kind: bglike_v5_heroes
    with_heroes: true
    percent_high_game: 0.0

agent:
  id: ppo
  params:
    network_type: bglike_structured_v11_heroes
    observation_type: vector
    # --- DvD knobs neutralized: identities exist but carry no reward ---
    num_identities: 4
    diversity_coef: 0.0
    diversity_ema: 0.1
    identity_seed: 103
    # --- v11 architecture (2 entity-attn layers; flat clean trunk) ---
    slot_hidden_channels: 64
    card_emb_dim: 16
    entity_attention_layers: 2
    entity_attention_heads: 4
    entity_attention_ff_mult: 4
    entity_attention_init_scale: 0.1
    action_cross_attn_heads: 4
    action_cross_attn_ff_mult: 2
    action_cross_attn_init_scale: 0.1
    ability_emb_dim: 8
    state_dim: 128
    action_dim: 64
    order_hidden: 64
    order_pos_dim: 16
    summary_queries: 2
    thinking_blocks: 1
    thinking_hidden: 256
    economy_hidden: 64
    economy_out: 32
    combat_out: 16
    pending_ctx_out: 16
    # --- hero scalar encoder (new in v11_heroes) ---
    hero_hidden: 48
    hero_out: 24
    learning_rate: 0.0001
    discount_factor: 1.0
    gae_lambda: 0.99
    ppo_clip_eps: 0.2
    clip_value_loss: false
    value_clip_eps: null
    entropy_coef: 0.01
    value_coef: 0.05
    max_grad_norm: 1.0
    rollout_steps: 32768
    ppo_epochs: 4
    minibatch_size: 1024
    device: cuda
    # --- RND intrinsic-motivation exploration (combo discovery) ---
    rnd:
      enabled: true
      # Advantage combination (both streams normalized together afterwards).
      # int_coef from the 16k/3-round probe: at 1.0 the intrinsic advantage was
      # 0.2-0.6x the extrinsic (mean ~0.4, never dominant); 0.7 keeps the mean
      # share ~0.3 with headroom as the extrinsic advantage compresses.
      ext_coef: 1.0
      int_coef: 0.7
      # Intrinsic stream: turn-level, non-episodic. gamma/lambda are PER TURN.
      int_gamma: 0.99
      int_lambda: 0.95
      # value_coef_int from the probe grad-norm decomposition: at 0.5 the
      # value_int term's gradient swamped the policy's by 10-16x on the shared
      # trunk (consistently, across all 3 rounds) — it was quietly hijacking the
      # encoder. 0.04 balances gradnorm_value_int ~ gradnorm_policy. Watch
      # rnd/gradnorm_value_int vs rnd/gradnorm_policy and keep them comparable.
      value_coef_int: 0.04
      predictor_coef: 1.0
      update_proportion: 0.25
      predictor_lr: 0.0001
      # Seed obs/return normalization on round 0 before the bonus turns on.
      warmup_rounds: 1
      # Target/predictor MLPs over the (n_normal, n_golden) board-count vector.
      embed_dim: 128
      target_hidden: 256
      predictor_hidden: 256
      predictor_layers: 2
      obs_clip: 5.0

train:
  max_episodes: 10000000
  total_steps: 10000000
  deterministic: false
  track_timings: false
  start_policy: random
  opponent_sampler:
    type: pool
    params:
      seed: 103
      self_play:
        start_episode: 0
        max_frozen_agents: 15
        save_every: 1000
      scripted:
        mode: bglike
        distribution:
          t1_random: 1
          t_up_random: 1
          structured: 1
          random: 1
      league:
        rating:
          kind: trueskill
          trueskill:
            mu: 25.0
            sigma: 8.333
            beta: 4.167
            tau: 0.083
            draw_probability: 0.01
        sampler:
          kind: trueskill_quality
          current_self_fraction: 0.0
  callbacks:
    - type: checkpoint
      params:
        interval: 200000
        prefix: dist_bglike_ppo_v11_heroes_rnd
    - type: metrics_file
      params:
        interval: 1
        preset: ppo_rnd

eval:
  enabled: false
  num_episodes: 100
  deterministic: true

distributed:
  workers: 40
  worker_device: cpu
