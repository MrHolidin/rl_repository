# DvD config: v6 architecture + v7 identity conditioning + assigned-tribe bonus.
# Each identity is permanently assigned one tribe (identity_tribes); its intrinsic
# terminal bonus (diversity_reward_mode="final", default) =
#     diversity_coef * (NUMBER of that tribe's minions on the FINAL board).
# COUNT, not fraction: one tribe minion is worth diversity_coef. The earlier
# fraction form made one minion worth only coef/board_size (~coef/7) — too weak
# to flip any buy (dist_ppo_083 showed zero causal differentiation at coef 0.2).
# Scale: a full 7-minion tribe board ≈ 7*coef; keep that comparable to the
# placement reward (∈[-1,1]) so winning still matters — hence coef≈0.1 here
# (one minion=0.1, full board≈0.7). Too high → on-tribe-but-weak; too low →
# collapse to one build. diversity_coef: 0.0 → plain v7 (no diversity) for A/B.
# (diversity_reward_mode: acquisition exists behind the flag but over-counts
# combat/token churn and drowns placement — not recommended.)
seed: 13

game:
  id: bglike
  params:
    seed: 13
    battle_damage_shaping: 0.0
    num_current_seats: 4
    patch_dir: data/bgcore/19_6_0_74257
    shop_excluded_count: 1
    obs_kind: bglike_v5
    percent_high_game: 0.0

agent:
  id: ppo
  params:
    network_type: bglike_structured_v7
    observation_type: vector
    # --- DvD knobs (consumed by PPODvDAgent / v7) ---
    num_identities: 4
    identity_tribes: [DRAGON, ELEMENTAL, BEAST, PIRATE]
    # potential = Ng potential shaping Φ=coef*(#own-tribe minions); signed per-step
    #   deltas telescope to coef*final_count (== the "final" terminal reward in
    #   total) but credit lands at the step composition changes so PPO can follow
    #   it. "final" (terminal-only) gave zero behavioural differentiation in
    #   dist_ppo_083 (fraction) AND dist_ppo_084 (count): the identity value head
    #   absorbs the predictable terminal bonus → advantage≈0 on tribe-buys.
    diversity_reward_mode: potential
    diversity_coef: 0.1             # annealed from 1.0 (run 087) — keep diversity, restore placement
    diversity_ema: 0.1
    identity_seed: 103
    # --- v6-equivalent architecture (unchanged) ---
    slot_hidden_channels: 64
    region_conv2_kernel: 1
    card_emb_dim: 16
    entity_attention_layers: 4
    entity_attention_heads: 4
    entity_attention_ff_mult: 4
    entity_attention_init_scale: 0.1
    action_cross_attn_heads: 4
    action_cross_attn_ff_mult: 2
    action_cross_attn_init_scale: 0.1
    ability_emb_dim: 8
    state_dim: 128
    action_dim: 64
    order_hidden: 64
    order_pos_dim: 16
    learning_rate: 0.0001
    discount_factor: 1.0
    gae_lambda: 0.99
    ppo_clip_eps: 0.2
    clip_value_loss: true
    value_clip_eps: null
    entropy_coef: 0.01
    value_coef: 1.0
    max_grad_norm: 1.0
    rollout_steps: 32768
    ppo_epochs: 4
    minibatch_size: 1024
    device: cuda
    # battle_pred left disabled for the step-2 smoke (keeps the obs path simple).

train:
  max_episodes: 10000000
  total_steps: 5000000
  deterministic: false
  track_timings: false
  start_policy: random
  opponent_sampler:
    type: pool
    params:
      seed: 103
      self_play:
        start_episode: 0
        max_frozen_agents: 15
        save_every: 1000
      scripted:
        mode: bglike
        distribution:
          t1_random: 1
          t_up_random: 1
          structured: 1
          random: 1
      league:
        rating:
          kind: trueskill
          trueskill:
            mu: 25.0
            sigma: 8.333
            beta: 4.167
            tau: 0.083
            draw_probability: 0.01
        sampler:
          kind: trueskill_quality
          current_self_fraction: 0.0
  callbacks:
    - type: checkpoint
      params:
        interval: 200000
        prefix: dist_bglike_ppo_dvd_v7_coef01
    - type: metrics_file
      params:
        interval: 1
        preset: ppo_dvd

eval:
  enabled: false
  num_episodes: 100
  deterministic: true

distributed:
  workers: 10
  worker_device: cpu
  checkpoint: runs/bglike/dist_ppo_087/checkpoints/dist_bglike_ppo_dvd_v7_74257_10025634.pt
