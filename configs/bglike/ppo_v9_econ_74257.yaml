# v9 = v8 + ECONOMY-COLOURED ACTION QUERIES. Identical net trunk / critic /
# hparams / league to ppo_v8_dist (run 004); the only change is the network:
# each action token gets an additive economy term (core globals + tribe
# rotation, 25 dims) projected into action_dim BEFORE it cross-attends to the
# board/shop. So a LEVEL_UP token (which carries no entity) finally queries the
# board as a function of its own tier-up cost and the gold on hand, instead of
# seeing the economy only at the final score_fc MLP.
#
# action_econ_proj is zero-init => v9 reproduces v8 byte-for-byte at step 0.
# Trains from scratch (no `checkpoint:`), same as runs 003/004/005 — the
# distributed loader rebuilds the net from the checkpoint's OWN stored
# ppo_network_type, so it cannot cross-version warm-start a v8 file into v9.
# To warm-start from run 004 instead, use scripts/warm_start_cross_version.py
# (strict=False load: v9 starts == 004 and only learns action_econ_proj).
#
# Same obs (OBS_DIM_V5 = 2536) and post-2026-06-10 rules. Keep diversity_coef /
# shaping at 0 (distributional critic assumes terminal reward == placement_reward).
seed: 13

game:
  id: bglike
  params:
    seed: 13
    battle_damage_shaping: 0.0
    num_current_seats: 4
    patch_dir: data/bgcore/19_6_0_74257
    shop_excluded_count: 1
    obs_kind: bglike_v5
    percent_high_game: 0.0

agent:
  id: ppo
  params:
    network_type: bglike_structured_v9
    observation_type: vector
    # --- DvD knobs neutralized: identities exist but carry no reward ---
    num_identities: 4
    diversity_coef: 0.0
    diversity_ema: 0.1
    identity_seed: 103
    # --- architecture identical to 004 / v8 ---
    slot_hidden_channels: 64
    region_conv2_kernel: 1
    card_emb_dim: 16
    entity_attention_layers: 4
    entity_attention_heads: 4
    entity_attention_ff_mult: 4
    entity_attention_init_scale: 0.1
    action_cross_attn_heads: 4
    action_cross_attn_ff_mult: 2
    action_cross_attn_init_scale: 0.1
    ability_emb_dim: 8
    state_dim: 128
    action_dim: 64
    order_hidden: 64
    order_pos_dim: 16
    learning_rate: 0.0001
    discount_factor: 1.0
    gae_lambda: 0.99
    ppo_clip_eps: 0.2
    clip_value_loss: false
    value_clip_eps: null
    entropy_coef: 0.01
    value_coef: 0.05
    max_grad_norm: 1.0
    rollout_steps: 32768
    ppo_epochs: 4
    minibatch_size: 1024
    device: cuda

train:
  max_episodes: 10000000
  total_steps: 10000000
  deterministic: false
  track_timings: false
  start_policy: random
  opponent_sampler:
    type: pool
    params:
      seed: 103
      self_play:
        start_episode: 0
        max_frozen_agents: 15
        save_every: 1000
      scripted:
        mode: bglike
        distribution:
          t1_random: 1
          t_up_random: 1
          structured: 1
          random: 1
      league:
        rating:
          kind: trueskill
          trueskill:
            mu: 25.0
            sigma: 8.333
            beta: 4.167
            tau: 0.083
            draw_probability: 0.01
        sampler:
          kind: trueskill_quality
          current_self_fraction: 0.0
  callbacks:
    - type: checkpoint
      params:
        interval: 200000
        prefix: dist_bglike_ppo_v9_econ
    - type: metrics_file
      params:
        interval: 1
        preset: ppo_dvd

eval:
  enabled: false
  num_episodes: 100
  deterministic: true

distributed:
  workers: 10
  worker_device: cpu
